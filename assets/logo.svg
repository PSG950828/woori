<svg viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">우리안과 로고</title>
  <desc id="logoDesc">청록색 다이아몬드 심볼과 우리안과 워드마크</desc>
  <style>
    .mark rect {
      width: 86px;
      height: 86px;
      rx: 18;
      ry: 18;
      transform: rotate(45deg);
    }
    .logotype {
      font-family: 'Pretendard', 'SUIT', 'Spoqa Han Sans Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      font-weight: 700;
      font-size: 96px;
      letter-spacing: -0.04em;
      fill: #1d4794;
    }
  </style>
  <g class="mark" transform="translate(95 88)">
    <rect x="-94" y="-48" fill="#2c6ab7" />
